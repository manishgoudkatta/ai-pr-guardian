<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PR Guardian — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --green: #3fb950;
            --green-bg: rgba(63, 185, 80, 0.1);
            --yellow: #d29922;
            --yellow-bg: rgba(210, 153, 34, 0.1);
            --orange: #db6d28;
            --orange-bg: rgba(219, 109, 40, 0.1);
            --red: #f85149;
            --red-bg: rgba(248, 81, 73, 0.1);
            --blue: #58a6ff;
            --blue-bg: rgba(88, 166, 255, 0.1);
            --purple: #bc8cff;
            --purple-bg: rgba(188, 140, 255, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

        /* ── Header ────────────────────────── */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #1a1f2e 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-badge { background: var(--accent-glow); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(88,166,255,0.2); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); }
        .user-name { font-size: 14px; font-weight: 600; }
        .logout-btn { color: var(--text-muted); font-size: 13px; text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; }
        .logout-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        /* ── Tabs ──────────────────────────── */
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 40px; background: var(--bg-secondary); }
        .tab { padding: 14px 24px; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .container { max-width: 1280px; margin: 0 auto; padding: 32px 40px; }

        /* ── Panels ────────────────────────── */
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ── Metrics ───────────────────────── */
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .metric-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; position: relative; overflow: hidden; transition: all 0.3s;
        }
        .metric-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .metric-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), var(--purple)); }
        .metric-card:nth-child(2)::before { background: linear-gradient(90deg, var(--green), #56d364); }
        .metric-card:nth-child(3)::before { background: linear-gradient(90deg, var(--orange), var(--yellow)); }
        .metric-card:nth-child(4)::before { background: linear-gradient(90deg, var(--purple), var(--accent)); }
        .metric-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .metric-value { font-size: 36px; font-weight: 800; color: #ffffff; }
        .metric-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

        /* ── Repo Cards ────────────────────── */
        .repos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .repo-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s;
        }
        .repo-card:hover { border-color: var(--accent); }
        .repo-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .repo-info h3 a { color: var(--accent); text-decoration: none; }
        .repo-info h3 a:hover { text-decoration: underline; }
        .repo-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }
        .repo-meta .lang { display: flex; align-items: center; gap: 4px; }
        .lang-dot { width: 10px; height: 10px; border-radius: 50%; }
        .toggle-btn {
            padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
            font-family: inherit; cursor: pointer; border: none; transition: all 0.2s;
        }
        .toggle-btn.enable { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
        .toggle-btn.enable:hover { background: var(--green); color: #fff; }
        .toggle-btn.disable { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
        .toggle-btn.disable:hover { background: var(--red); color: #fff; }
        .toggle-btn:disabled { opacity: 0.5; cursor: wait; }

        /* ── Reviews ───────────────────────── */
        .review-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; transition: all 0.3s; margin-bottom: 16px;
        }
        .review-card:hover { border-color: var(--accent); }
        .review-header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .review-header:hover { background: rgba(88,166,255,0.03); }
        .review-info { display: flex; align-items: center; gap: 16px; }
        .review-score { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; }
        .score-high { background: var(--green-bg); color: var(--green); }
        .score-medium { background: var(--yellow-bg); color: var(--yellow); }
        .score-low { background: var(--orange-bg); color: var(--orange); }
        .score-critical { background: var(--red-bg); color: var(--red); }
        .review-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .review-meta { display: flex; gap: 14px; margin-top: 4px; }
        .review-meta span { font-size: 12px; color: var(--text-secondary); }
        .badge { padding: 3px 10px; border-radius: 16px; font-size: 11px; font-weight: 600; }
        .badge-critical { background: var(--red-bg); color: var(--red); }
        .badge-high { background: var(--orange-bg); color: var(--orange); }
        .badge-medium { background: var(--yellow-bg); color: var(--yellow); }
        .expand-icon { color: var(--text-muted); transition: transform 0.3s; font-size: 16px; }
        .review-card.expanded .expand-icon { transform: rotate(180deg); }
        .review-detail { display: none; border-top: 1px solid var(--border); padding: 24px; }
        .review-card.expanded .review-detail { display: block; animation: fadeIn 0.3s; }

        /* ── File Table ────────────────────── */
        .file-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .file-table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .file-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid rgba(48,54,61,0.5); }
        .file-name { font-family: 'SF Mono', monospace; font-size: 12px; color: var(--accent); }
        .verdict-tag { padding: 3px 10px; border-radius: 16px; font-size: 11px; font-weight: 600; }
        .verdict-EXCELLENT { background: var(--green-bg); color: var(--green); }
        .verdict-GOOD { background: var(--blue-bg); color: var(--blue); }
        .verdict-NEEDS_IMPROVEMENT { background: var(--yellow-bg); color: var(--yellow); }
        .verdict-RISKY { background: var(--orange-bg); color: var(--orange); }
        .verdict-CRITICAL { background: var(--red-bg); color: var(--red); }
        .score-bar { width: 100%; height: 4px; background: var(--bg-tertiary); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 2px; }

        /* ── Comments ──────────────────────── */
        .comment-item { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; border-left: 3px solid; }
        .comment-item.sev-critical { border-left-color: var(--red); }
        .comment-item.sev-high { border-left-color: var(--orange); }
        .comment-item.sev-medium { border-left-color: var(--yellow); }
        .comment-item.sev-low { border-left-color: var(--blue); }
        .comment-item.sev-info { border-left-color: var(--purple); }
        .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .comment-file { font-family: monospace; font-size: 11px; color: var(--accent); background: var(--accent-glow); padding: 2px 8px; border-radius: 4px; }
        .comment-sev { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .comment-msg { font-size: 13px; line-height: 1.5; }
        .comment-suggestion { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-top: 8px; font-family: monospace; font-size: 12px; color: var(--green); white-space: pre-wrap; }

        .empty-state { text-align: center; padding: 60px 40px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h2 { font-size: 18px; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 13px; }

        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: 700; }
        .refresh-btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: all 0.2s; }
        .refresh-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

        .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: var(--text-muted); }
        .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .search-input {
            background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary);
            padding: 10px 16px; border-radius: 8px; font-size: 14px; font-family: inherit;
            width: 100%; max-width: 400px; margin-bottom: 20px; outline: none; transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }

        @media (max-width: 900px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } .container { padding: 20px; } }
        @media (max-width: 600px) { .metrics-grid { grid-template-columns: 1fr; } .repos-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span style="font-size: 24px;">🛡️</span>
            <h1>AI PR Guardian</h1>
            <span class="header-badge">Dashboard</span>
        </div>
        <div class="user-info" id="user-info"></div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('overview')">📊 Overview</div>
        <div class="tab" onclick="switchTab('repos')">📁 Repositories</div>
        <div class="tab" onclick="switchTab('reviews')">📋 Reviews</div>
    </div>

    <div class="container">
        <!-- Overview Panel -->
        <div class="panel active" id="panel-overview">
            <div class="metrics-grid" id="metrics">
                <div class="metric-card"><div class="metric-label">Total Reviews</div><div class="metric-value" id="m-reviews">—</div><div class="metric-sub">Pull requests analyzed</div></div>
                <div class="metric-card"><div class="metric-label">Avg Safety Score</div><div class="metric-value" id="m-score">—</div><div class="metric-sub">Out of 100</div></div>
                <div class="metric-card"><div class="metric-label">Issues Found</div><div class="metric-value" id="m-issues">—</div><div class="metric-sub">Bugs, security, style</div></div>
                <div class="metric-card"><div class="metric-label">Tokens Used</div><div class="metric-value" id="m-tokens">—</div><div class="metric-sub">LLM consumption</div></div>
            </div>
            <div class="section-header">
                <div class="section-title">📋 Recent Reviews</div>
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            </div>
            <div id="recent-reviews"><div class="loading"><div class="spinner"></div>Loading...</div></div>
        </div>

        <!-- Repos Panel -->
        <div class="panel" id="panel-repos">
            <div class="section-header">
                <div class="section-title">📁 Your Repositories</div>
                <button class="refresh-btn" onclick="loadRepos()">🔄 Refresh</button>
            </div>
            <input type="text" class="search-input" placeholder="🔍 Search repositories..." oninput="filterRepos(this.value)">
            <div id="repos-container"><div class="loading"><div class="spinner"></div>Loading repos...</div></div>
        </div>

        <!-- Reviews Panel -->
        <div class="panel" id="panel-reviews">
            <div class="section-header">
                <div class="section-title">📋 All Reviews</div>
                <button class="refresh-btn" onclick="loadReviews()">🔄 Refresh</button>
            </div>
            <div id="reviews-container"><div class="loading"><div class="spinner"></div>Loading reviews...</div></div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let allRepos = [];

        function getScoreClass(s) { return s >= 80 ? 'score-high' : s >= 60 ? 'score-medium' : s >= 40 ? 'score-low' : 'score-critical'; }
        function getScoreColor(s) { return s >= 80 ? '#3fb950' : s >= 60 ? '#d29922' : s >= 40 ? '#db6d28' : '#f85149'; }
        function fmtTime(ts) { return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
            document.getElementById(`panel-${name}`).classList.add('active');
            if (name === 'repos') loadRepos();
            if (name === 'reviews') loadReviews();
        }

        function toggleReview(id) { document.getElementById(`review-${id}`).classList.toggle('expanded'); }

        const langColors = { Python: '#3776ab', JavaScript: '#f7df1e', TypeScript: '#3178c6', Java: '#b07219', Go: '#00add8', Rust: '#dea584', HTML: '#e34c26', CSS: '#563d7c', C: '#555', 'C++': '#f34b7d' };

        function renderRepoCard(r) {
            const color = langColors[r.language] || '#8b949e';
            return `
                <div class="repo-card" data-name="${r.full_name.toLowerCase()}">
                    <div class="repo-info">
                        <h3><a href="https://github.com/${r.full_name}" target="_blank">${r.full_name}</a></h3>
                        <div class="repo-meta">
                            ${r.language ? `<span class="lang"><span class="lang-dot" style="background:${color}"></span>${r.language}</span>` : ''}
                            <span>${r.private ? '🔒 Private' : '🌐 Public'}</span>
                        </div>
                    </div>
                    <button class="toggle-btn ${r.enabled ? 'disable' : 'enable'}" onclick="toggleRepo('${r.full_name}', ${r.enabled})" id="btn-${r.full_name.replace('/','-')}">
                        ${r.enabled ? '✕ Disable' : '✓ Enable'}
                    </button>
                </div>`;
        }

        async function toggleRepo(fullName, isEnabled) {
            const [owner, repo] = fullName.split('/');
            const btn = document.getElementById(`btn-${fullName.replace('/','-')}`);
            btn.disabled = true;
            btn.textContent = '...';
            try {
                const action = isEnabled ? 'disable' : 'enable';
                await fetch(`${API}/auth/repos/${owner}/${repo}/${action}`, { method: 'POST' });
                loadRepos();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
            btn.disabled = false;
        }

        function filterRepos(q) {
            const lower = q.toLowerCase();
            document.querySelectorAll('.repo-card').forEach(c => {
                c.style.display = c.dataset.name.includes(lower) ? '' : 'none';
            });
        }

        function renderReview(r, idx) {
            const s = r.score || 0;
            const badges = [];
            if (r.critical > 0) badges.push(`<span class="badge badge-critical">🔴 ${r.critical}</span>`);
            if (r.high > 0) badges.push(`<span class="badge badge-high">🟠 ${r.high}</span>`);
            if (r.medium > 0) badges.push(`<span class="badge badge-medium">🟡 ${r.medium}</span>`);

            let detail = '';
            if (r.file_reports && r.file_reports.length) {
                detail += '<table class="file-table"><thead><tr><th>File</th><th>Score</th><th>Verdict</th><th>Summary</th></tr></thead><tbody>';
                for (const fr of r.file_reports) {
                    detail += `<tr><td><span class="file-name">${fr.file}</span></td><td><strong style="color:${getScoreColor(fr.score)}">${fr.score}</strong><div class="score-bar"><div class="score-bar-fill" style="width:${fr.score}%;background:${getScoreColor(fr.score)}"></div></div></td><td><span class="verdict-tag verdict-${fr.verdict}">${(fr.verdict||'').replace('_',' ')}</span></td><td style="font-size:12px;color:var(--text-secondary);max-width:300px">${fr.summary||'—'}</td></tr>`;
                }
                detail += '</tbody></table>';
            }
            if (r.comments && r.comments.length) {
                detail += `<div style="font-size:14px;font-weight:600;margin-bottom:10px">💬 ${r.comments.length} Comments</div>`;
                for (const c of r.comments.slice(0, 20)) {
                    const sev = c.severity || 'info';
                    detail += `<div class="comment-item sev-${sev}"><div class="comment-header"><span class="comment-file">${c.path}:${c.line}</span><span class="comment-sev" style="color:var(--${sev==='critical'?'red':sev==='high'?'orange':sev==='medium'?'yellow':'blue'})">${sev}</span></div><div class="comment-msg">${c.message||''}</div>${c.suggestion?`<div class="comment-suggestion">${c.suggestion}</div>`:''}</div>`;
                }
            }

            return `
                <div class="review-card" id="review-${idx}">
                    <div class="review-header" onclick="toggleReview(${idx})">
                        <div class="review-info">
                            <div class="review-score ${getScoreClass(s)}">${s}</div>
                            <div>
                                <div class="review-title">PR #${r.pr_number} — ${r.repo||'?'}</div>
                                <div class="review-meta">
                                    <span>📁 ${r.files_reviewed||0} files</span>
                                    <span>🐛 ${r.total_issues||0} issues</span>
                                    <span>🕐 ${r.timestamp ? fmtTime(r.timestamp) : '—'}</span>
                                </div>
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px">${badges.join('')}<span class="expand-icon">▼</span></div>
                    </div>
                    <div class="review-detail">${detail || '<p style="color:var(--text-muted)">No details available.</p>'}</div>
                </div>`;
        }

        async function loadUser() {
            const r = await fetch(`${API}/auth/me`);
            const u = await r.json();
            if (u.logged_in) {
                document.getElementById('user-info').innerHTML = `
                    <img class="user-avatar" src="${u.avatar_url}" alt="">
                    <span class="user-name">${u.name || u.login}</span>
                    <a href="/auth/logout" class="logout-btn">Sign out</a>`;
            }
        }

        async function loadData() {
            const sr = await fetch(`${API}/stats`); const s = await sr.json();
            document.getElementById('m-reviews').textContent = s.total_reviews || 0;
            document.getElementById('m-score').textContent = s.avg_score ? Math.round(s.avg_score) : '—';
            document.getElementById('m-issues').textContent = s.total_issues || 0;
            document.getElementById('m-tokens').textContent = (s.total_tokens || 0).toLocaleString();

            const rr = await fetch(`${API}/reviews`); const reviews = await rr.json();
            const c = document.getElementById('recent-reviews');
            if (!reviews.length) {
                c.innerHTML = '<div class="empty-state"><div class="icon">🛡️</div><h2>No Reviews Yet</h2><p>Enable a repo and open a pull request to trigger your first AI review.</p></div>';
            } else {
                c.innerHTML = reviews.slice(0, 5).map((r, i) => renderReview(r, i)).join('');
            }
        }

        async function loadRepos() {
            const c = document.getElementById('repos-container');
            c.innerHTML = '<div class="loading"><div class="spinner"></div>Loading repos...</div>';
            try {
                const r = await fetch(`${API}/auth/repos`); allRepos = await r.json();
                if (!allRepos.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📁</div><h2>No Repos Found</h2></div>'; return; }
                const enabled = allRepos.filter(r => r.enabled);
                const disabled = allRepos.filter(r => !r.enabled);
                let html = '';
                if (enabled.length) { html += `<div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:12px">✓ Enabled (${enabled.length})</div><div class="repos-grid">${enabled.map(renderRepoCard).join('')}</div><div style="margin-bottom:24px"></div>`; }
                html += `<div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px">Available (${disabled.length})</div><div class="repos-grid">${disabled.map(renderRepoCard).join('')}</div>`;
                c.innerHTML = html;
            } catch (e) { c.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h2>Error loading repos</h2></div>'; }
        }

        async function loadReviews() {
            const c = document.getElementById('reviews-container');
            const r = await fetch(`${API}/reviews`); const reviews = await r.json();
            if (!reviews.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h2>No Reviews Yet</h2></div>'; }
            else { c.innerHTML = reviews.map((r, i) => renderReview(r, 100 + i)).join(''); }
        }

        loadUser();
        loadData();
        setInterval(loadData, 20000);
    </script>
</body>
</html>
